  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="10km Metz">
  <title>10km Metz · Programme</title>
  <style>
    :root {
      --primary: #FF6B35;
      --primary-light: #FFF0EB;
      --success: #16A34A;
      --success-light: #F0FDF4;
      --success-border: #86EFAC;
      --border: #E5E7EB;
      --text: #111827;
      --muted: #6B7280;
      --bg: #F3F4F6;
      --white: #ffffff;
      --gray-bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 20px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--white);
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 17px; font-weight: 800; color: var(--text); }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── WEEK NAV ── */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .nav-btn {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      padding: 7px 16px; font-size: 16px; color: var(--text); cursor: pointer;
      transition: background 0.15s;
    }
    .nav-btn:active { background: var(--bg); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }
    .week-info { text-align: center; flex: 1; padding: 0 8px; }
    .week-id { font-weight: 800; font-size: 15px; color: var(--text); }
    .week-dates { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .week-cycle { font-size: 11px; color: var(--primary); font-weight: 700; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }

    /* ── VOLUME BAR ── */
    .vol-bar {
      background: var(--primary-light);
      padding: 7px 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .vol-text { font-size: 13px; color: var(--primary); font-weight: 700; }
    .vol-progress { font-size: 12px; color: var(--muted); }

    /* ── SESSIONS ── */
    .sessions { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: var(--white);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .card.done { border-color: var(--success-border); background: var(--success-light); }
    .card.rest { background: var(--gray-bg); opacity: 0.6; border-color: var(--border); }
    .card.today { border-color: var(--primary); border-width: 2px; }

    .card-inner {
      display: flex; align-items: flex-start;
      padding: 13px 14px;
      cursor: pointer;
      user-select: none;
    }
    .card.rest .card-inner { cursor: default; }

    .card-check {
      width: 24px; height: 24px; flex-shrink: 0;
      border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-right: 12px; margin-top: 1px;
      background: var(--white); transition: all 0.2s;
      font-size: 13px;
    }
    .card.done .card-check { background: var(--success); border-color: var(--success); color: white; }
    .card.today .card-check { border-color: var(--primary); }
    .card.rest .card-check { display: none; }

    .card-content { flex: 1; min-width: 0; }
    .card-day {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
    }
    .card-day.today-day { color: var(--primary); }
    .today-pill {
      background: var(--primary); color: white;
      font-size: 9px; font-weight: 800; padding: 2px 6px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .card-name { font-size: 15px; font-weight: 700; margin-top: 3px; color: var(--text); }
    .card-detail { font-size: 13px; color: var(--muted); margin-top: 5px; line-height: 1.45; }
    .card-allure {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 7px; background: var(--gray-bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 4px 9px; font-size: 12px; font-weight: 700; color: var(--text);
    }
    .card.done .card-allure { background: white; border-color: var(--success-border); }

    /* ── WARMUP / RAC ── */
    .card-structure {
      display: flex; align-items: center; gap: 6px;
      margin-top: 9px; padding-top: 9px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .struct-pill {
      display: inline-flex; align-items: center; gap: 4px;
      border-radius: 7px; padding: 3px 8px; font-size: 11px; font-weight: 700;
    }
    .struct-pill.echauff { background: #E1F5EE; color: #0F6E56; }
    .struct-pill.corps   { background: #FFF0EB; color: #993C1D; }
    .struct-pill.rac     { background: #E6F1FB; color: #185FA5; }
    .struct-arrow { font-size: 10px; color: var(--muted); }

    /* ── COUNTDOWN ── */
    .countdown {
      margin: 4px 10px 12px;
      background: var(--white); border-radius: 14px;
      border: 1.5px solid var(--border); padding: 14px;
      text-align: center;
    }
    .cd-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .cd-days { font-size: 34px; font-weight: 900; color: var(--primary); line-height: 1.1; margin: 4px 0; }
    .cd-event { font-size: 13px; font-weight: 700; color: var(--text); }

    /* ── INFO BANNER ── */
    .info-banner {
      margin: 8px 10px 0;
      background: #EFF6FF; border: 1px solid #BFDBFE;
      border-radius: 10px; padding: 9px 12px;
      font-size: 12px; color: #1E40AF; line-height: 1.5;
    }
    .info-banner strong { font-weight: 700; }

    /* ── ALLURES REF ── */
    .allures-section { margin: 8px 10px 0; }
    .allures-toggle {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; font-weight: 700; color: var(--text);
      cursor: pointer; width: 100%; text-align: left;
      display: flex; justify-content: space-between; align-items: center;
    }
    .allures-body {
      background: var(--white); border: 1.5px solid var(--border);
      border-top: none; border-radius: 0 0 10px 10px;
      padding: 10px 14px; display: none;
    }
    .allures-body.open { display: block; }
    .allure-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--bg); font-size: 13px; }
    .allure-row:last-child { border-bottom: none; }
    .allure-row .zone { font-weight: 600; color: var(--text); }
    .allure-row .pace { color: var(--primary); font-weight: 700; }
  </style>
</head>

    {day:"Mar",type:"quali",label:"Allure 10km 2×8'",detail:"2×(8' @4:30), récup 3'",allure:"4:30 /km",echauff:"15' EF",rac:"10' trot"},

// ── STATE ──
let currentWeekIdx = 0;
let checks = {};

function loadChecks() {
  try { checks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e) { checks = {}; }
}
function saveChecks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checks)); } catch(e) {}
}
function checkKey(weekIdx, sessionIdx) { return weekIdx + "_" + sessionIdx; }

// ── HELPERS ──
function parseDate(s) { return new Date(s + "T00:00:00"); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmtDate(d) { return d.toLocaleDateString("fr-FR", { day:"numeric", month:"short" }); }

function findCurrentWeekIdx() {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < WEEKS.length; i++) {
    const s = parseDate(WEEKS[i].start), e = addDays(s, 6);
    if (today >= s && today <= e) return i;
  }
  return today < parseDate(WEEKS[0].start) ? 0 : WEEKS.length - 1;
}

// ── TOGGLE CHECK ──
function toggleCheck(weekIdx, sessionIdx) {
  const week = WEEKS[weekIdx];
  const session = week.sessions[sessionIdx];
  if (session.type === "repos") return;
  const key = checkKey(weekIdx, sessionIdx);
  checks[key] = !checks[key];
  saveChecks();
  renderWeek();
}

// ── TOGGLE ALLURES ──
function toggleAllures(btn) {
  const body = document.getElementById("allures-body");
  const arrow = document.getElementById("allures-arrow");
  body.classList.toggle("open");
  arrow.textContent = body.classList.contains("open") ? "▲" : "▼";
}

// ── RENDER ──
function renderWeek() {
  const week = WEEKS[currentWeekIdx];
  const startDate = parseDate(week.start);
  const endDate = addDays(startDate, 6);
  const today = new Date(); today.setHours(0,0,0,0);

  document.getElementById("week-id").textContent = week.id;
  document.getElementById("week-dates").textContent = fmtDate(startDate) + " – " + fmtDate(endDate);
  document.getElementById("week-cycle").textContent = week.cycle;
  document.getElementById("prev-btn").disabled = currentWeekIdx === 0;
  document.getElementById("next-btn").disabled = currentWeekIdx === WEEKS.length - 1;

  const typeIcons = { repos:"😴", ef:"🏃", quali:"⚡", sl:"🌄", renfo:"🏋️", backyard:"🏕️", test:"🏁", race:"🏆" };

  let doneCount = 0, totalNonRest = 0;

  let html = "";
  week.sessions.forEach((s, i) => {
    const dateObj = addDays(startDate, i); dateObj.setHours(0,0,0,0);
    const isToday = dateObj.getTime() === today.getTime();
    const key = checkKey(currentWeekIdx, i);
    const done = !!checks[key];

    if (s.type !== "repos") { totalNonRest++; if (done) doneCount++; }

    let cls = "card";
    if (s.type === "repos") cls += " rest";
    else if (done) cls += " done";
    else if (isToday) cls += " today";

    const icon = typeIcons[s.type] || "🏃";
    const checkIcon = done ? "✓" : "";
    const todayPill = isToday ? '<span class="today-pill">Aujourd\'hui</span>' : "";

    html += `<div class="${cls}" onclick="toggleCheck(${currentWeekIdx},${i})">
      <div class="card-inner">
        ${s.type !== "repos" ? `<div class="card-check">${checkIcon}</div>` : ""}
        <div class="card-content">
          <div class="card-day ${isToday?"today-day":""}">${s.day} ${fmtDate(dateObj)} ${todayPill}</div>
          <div class="card-name">${icon} ${s.label}</div>
          ${s.detail && s.type !== "repos" ? `<div class="card-detail">${s.detail}</div>` : ""}
          ${s.allure ? `<div class="card-allure">⏱ ${s.allure}</div>` : ""}
          ${s.echauff ? `<div class="card-structure">
            <span class="struct-pill echauff">➡ Échauff. ${s.echauff}</span>
            <span class="struct-arrow">·</span>
            <span class="struct-pill corps">⚡ Corps</span>
            <span class="struct-arrow">·</span>
            <span class="struct-pill rac">↩ RAC ${s.rac}</span>
          </div>` : ""}
        </div>
      </div>
    </div>`;
  });

  document.getElementById("sessions-container").innerHTML = html;

  document.getElementById("vol-text").textContent = "Volume : " + week.volume;
  document.getElementById("vol-progress").textContent = doneCount + "/" + totalNonRest + " séances ✓";

  // Info banner
  const isCurrentWeek = currentWeekIdx === findCurrentWeekIdx();
  const infoEl = document.getElementById("info-banner");
  if (isCurrentWeek) {
    infoEl.innerHTML = "<strong>💡 Astuce :</strong> Touche une séance pour la cocher comme réalisée. Tes coches sont sauvegardées sur cet appareil.";
    infoEl.style.display = "block";
  } else {
    infoEl.style.display = "none";
  }

  // Countdown
  const diff = Math.ceil((RACE_DATE - new Date()) / 86400000);
  document.getElementById("countdown").innerHTML =
    `<div class="cd-label">Compte à rebours</div>
     <div class="cd-days">${diff}</div>
     <div class="cd-event">🏁 10 km de Metz · 11 octobre 2026</div>`;
}

function changeWeek(delta) {
  currentWeekIdx = Math.max(0, Math.min(WEEKS.length - 1, currentWeekIdx + delta));
  renderWeek();
}

// ── INIT ──
loadChecks();
currentWeekIdx = findCurrentWeekIdx();
renderWeek();
</script>
